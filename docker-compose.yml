services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      # Persist DB outside the image layer
      DATABASE_URL: sqlite+aiosqlite:////var/lib/aquaai/aquaai.db
      # Ensure CORS is fine if you hit backend directly on :8000
      CORS_ORIGINS: '["http://localhost:8080", "http://localhost:5173", "http://localhost:3000"]'
    volumes:
      - backend_db:/var/lib/aquaai
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        # Default to the dev key if not provided
        VITE_API_KEY: ${VITE_API_KEY:-dev_super_secret_key_123}
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_db:
