services:
  backend:
    build: .
    container_name: water-irrigation-backend
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./scalers:/app/scalers
      - ./data:/app/data
      - ./aquaai.db:/app/aquaai.db
    env_file: ./.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: always
    networks:
      - water-net

  frontend:
    build: ../frontend
    container_name: water-irrigation-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - water-net

  redis:
    image: redis:7-alpine
    container_name: water-irrigation-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - water-net

networks:
  water-net:
    driver: bridge
